name: Precomputer Vitest, TypeScript check

on:
  push:
    paths:
      - 'precomputer/**'
      - 'website/app/utils/validators.ts'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: './precomputer'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies (website)
        run: npm ci
        working-directory: ./website

      - name: Install dependencies (precomputer)
        run: npm ci
        working-directory: ./precomputer

      - name: Run all other tests
        run: npm run test
        working-directory: ./precomputer
